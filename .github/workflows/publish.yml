name: Publish Python Package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.9.0). Required for manual runs"
        required: true
        type: string
      skip_pypi:
        description: "Skip PyPI publication"
        required: false
        default: false
        type: boolean
      skip_docker:
        description: "Skip Docker image publication"
        required: false
        default: false
        type: boolean
      skip_mcp:
        description: "Skip MCP registry publication"
        required: false
        default: false
        type: boolean

# Deny all permissions at the workflow level; grant narrowly per job.
permissions: {}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      skip_pypi: ${{ steps.meta.outputs.skip_pypi }}
      skip_docker: ${{ steps.meta.outputs.skip_docker }}
      skip_mcp: ${{ steps.meta.outputs.skip_mcp }}
    steps:
      - name: Resolve version and retry flags
        id: meta
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_SKIP_PYPI: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_pypi || false }}
          INPUT_SKIP_DOCKER: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_docker || false }}
          INPUT_SKIP_MCP: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_mcp || false }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            version="${GITHUB_REF#refs/tags/v}"
          else
            version="${INPUT_VERSION}"
          fi

          if [ -z "${version}" ]; then
            echo "Unable to determine version" >&2
            exit 1
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "skip_pypi=${INPUT_SKIP_PYPI}" >> "$GITHUB_OUTPUT"
          echo "skip_docker=${INPUT_SKIP_DOCKER}" >> "$GITHUB_OUTPUT"
          echo "skip_mcp=${INPUT_SKIP_MCP}" >> "$GITHUB_OUTPUT"

  release-build:
    runs-on: ubuntu-latest
    needs:
      - prepare
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Build release distributions
        run: uv build --python 3.13

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-dists
          path: dist/

  pypi-publish:
    runs-on: ubuntu-latest
    needs:
      - release-build
      - prepare
    if: ${{ needs.prepare.outputs.skip_pypi != 'true' }}

    # Gate: this job pauses for Required Reviewers approval before running.
    # Enable it at: Settings → Environments → pypi → Required reviewers → add repo owner(s).
    # Branch/tag protection rules can also be set there to restrict which refs may publish.
    environment:
      name: pypi
      url: https://pypi.org/p/mcp-snowflake-server-nsp

    permissions:
      # Mandatory for OIDC trusted publishing (no API token needed).
      id-token: write
      # Required to create GitHub Attestations (Sigstore provenance).
      attestations: write
      contents: read

    steps:
      - name: Check whether version already exists on PyPI
        id: pypi-check
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          if curl -fsS "https://pypi.org/pypi/mcp-snowflake-server-nsp/${VERSION}/json" > /dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Version ${VERSION} already exists on PyPI; skipping publish step."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Version ${VERSION} not found on PyPI; publish step will run."
          fi

      - name: Retrieve release distributions
        if: steps.pypi-check.outputs.exists != 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-dists
          path: dist/

      - name: Publish release distributions to PyPI
        if: steps.pypi-check.outputs.exists != 'true'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1 (v1.14.0)
        with:
          verbose: true
          print-hash: true
          attestations: true

  docker-image-check:
    runs-on: ubuntu-latest
    needs:
      - prepare
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Check whether Docker image tag already exists
        id: check
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          if curl -fsS "https://hub.docker.com/v2/repositories/nsphung/mcp-snowflake-server-nsp/tags/${VERSION}" > /dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Docker tag ${VERSION} already exists; skipping image publish job."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Docker tag ${VERSION} not found; image publish job will run."
          fi

  # Reusable workflows cannot declare an `environment:` themselves, so this
  # lightweight gate job owns the environment and pauses for reviewer approval.
  # Enable it at: Settings → Environments → docker → Required reviewers → add repo owner(s).
  approve-docker:
    runs-on: ubuntu-latest
    needs:
      - release-build
      - prepare
      - docker-image-check
    if: ${{ needs.prepare.outputs.skip_docker != 'true' && needs.docker-image-check.outputs.exists != 'true' }}
    environment:
      name: docker
      url: https://hub.docker.com/r/nsphung/mcp-snowflake-server-nsp
    permissions: {}
    steps:
      - name: Docker publish approved
        run: echo "Docker publish approved by maintainer"

  publish-docker-image:
    uses: docker/github-builder/.github/workflows/build.yml@7d2a02426d4b989616ba5aaee4e879afd4134b0d # v1.6.0
    needs:
      - approve-docker
      - release-build
      - prepare
      - docker-image-check
    if: ${{ needs.prepare.outputs.skip_docker != 'true' && needs.docker-image-check.outputs.exists != 'true' }}
    permissions:
      contents: read
      id-token: write
    with:
      output: image
      push: true
      platforms: linux/amd64,linux/arm64
      meta-images: nsphung/mcp-snowflake-server-nsp
      meta-tags: |
        type=semver,pattern={{version}}
    secrets:
      registry-auths: |
        - registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

  dockerhub-description:
    runs-on: ubuntu-latest
    needs:
      - publish-docker-image
      - docker-image-check
      - prepare
    if: ${{ always() && !cancelled() && needs.prepare.outputs.skip_docker != 'true' && (needs.publish-docker-image.result == 'success' || needs.docker-image-check.outputs.exists == 'true') }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Update repo description
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: nsphung/mcp-snowflake-server-nsp

  mcp-publish:
    runs-on: ubuntu-latest
    needs:
      - pypi-publish
      - publish-docker-image
      - docker-image-check
      - prepare
    permissions:
      id-token: write
      contents: read
    if: ${{ always() && !cancelled() && needs.prepare.outputs.skip_mcp != 'true' && (needs.prepare.outputs.skip_pypi == 'true' || needs.pypi-publish.result == 'success') && (needs.prepare.outputs.skip_docker == 'true' || needs.publish-docker-image.result == 'success' || needs.docker-image-check.outputs.exists == 'true') }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check whether MCP server version already exists
        id: mcp-check
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          SERVER_NAME=$(jq -r '.name' server.json)
          result=$(curl -fsS --get "https://registry.modelcontextprotocol.io/v0.1/servers" \
            --data-urlencode "search=${SERVER_NAME}" \
            --data-urlencode "version=${VERSION}")
          echo "$result"

          exists=$(echo "$result" | jq -r --arg name "$SERVER_NAME" --arg version "$VERSION" '
            (.servers // [])
            | any(.[]; .server.name == $name and .server.version == $version)
          ')

          echo "exists=${exists}" >> "$GITHUB_OUTPUT"
          if [ "$exists" = "true" ]; then
            echo "MCP server ${SERVER_NAME}@${VERSION} already published; skipping publish steps."
          else
            echo "MCP server ${SERVER_NAME}@${VERSION} not found; publish steps will run."
          fi

      - name: Install mcp-publisher
        if: steps.mcp-check.outputs.exists != 'true'
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry
        if: steps.mcp-check.outputs.exists != 'true'
        run: ./mcp-publisher login github-oidc

      - name: Set version in server.json
        if: steps.mcp-check.outputs.exists != 'true'
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          jq --arg v "$VERSION" '.version = $v | .packages[0].version = $v | .packages[1].identifier |= gsub("\\$\\{VERSION\\}"; $v)' server.json > server.tmp && mv server.tmp server.json

      - name: Validate server.json
        if: steps.mcp-check.outputs.exists != 'true'
        run: |
          result=$(curl -sf -X POST https://registry.modelcontextprotocol.io/v0.1/validate \
            -H 'Content-Type: application/json' \
            -d @server.json)
          echo "$result"
          echo "$result" | jq -e '.valid == true'

      - name: Publish server to MCP Registry
        if: steps.mcp-check.outputs.exists != 'true'
        run: ./mcp-publisher publish
