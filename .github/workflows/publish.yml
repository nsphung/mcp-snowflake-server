name: Publish Python Package

on:
  release:
    types: [published]

# Deny all permissions at the workflow level; grant narrowly per job.
permissions: {}

jobs:
  release-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Build release distributions
        run: uv build --python 3.13

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-dists
          path: dist/

  pypi-publish:
    runs-on: ubuntu-latest
    needs:
      - release-build

    # Strongly recommended: a dedicated environment with branch/tag protection
    # rules prevents accidental or unauthorised publishes.
    # Create it at: Settings → Environments → New environment → "pypi"
    environment:
      name: pypi
      url: https://pypi.org/p/mcp-snowflake-server-nsp

    permissions:
      # Mandatory for OIDC trusted publishing (no API token needed).
      id-token: write
      # Required to create GitHub Attestations (Sigstore provenance).
      attestations: write
      contents: read

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-dists
          path: dist/

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1 (v1.14.0)
        with:
          verbose: true
          print-hash: true
          attestations: true

      ### Publish MCP server:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Set version in server.json
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          jq --arg v "$VERSION" '.version = $v | .packages[0].version = $v | .packages[1].identifier |= gsub("\\$\\{VERSION\\}"; $v)' server.json > server.tmp && mv server.tmp server.json

      - name: Validate server.json
        run: |
          result=$(curl -sf -X POST https://registry.modelcontextprotocol.io/v0.1/validate \
            -H 'Content-Type: application/json' \
            -d @server.json)
          echo "$result"
          echo "$result" | jq -e '.valid == true'

      - name: Publish server to MCP Registry
        run: ./mcp-publisher publish

  publish-docker-image:
    uses: docker/github-builder/.github/workflows/build.yml@7d2a02426d4b989616ba5aaee4e879afd4134b0d # v1.6.0
    needs:
      - pypi-publish
    permissions:
      contents: read
      id-token: write
    with:
      output: image
      push: true
      platforms: linux/amd64,linux/arm64
      meta-images: nsphung/mcp-snowflake-server-nsp
      meta-tags: |
        type=semver,pattern={{version}}
    secrets:
      registry-auths: |
        - registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

  dockerhub-description:
    runs-on: ubuntu-latest
    needs:
      - publish-docker-image
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Update repo description
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: nsphung/mcp-snowflake-server-nsp
