name: Docker Image Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-dockerfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Validate Dockerfile
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          call: check

  validate-server-json:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Validate server.json against MCP registry
        run: |
          # Substitute ${VERSION} placeholder with a dummy semver so the API accepts it
          payload=$(jq '.version = "0.0.0" | .packages[0].version = "0.0.0" | .packages[1].identifier |= gsub("\\$\\{VERSION\\}"; "0.0.0")' server.json)
          result=$(echo "$payload" | curl -sf -X POST https://registry.modelcontextprotocol.io/v0.1/validate \
            -H 'Content-Type: application/json' \
            -d @-)
          echo "$result"
          echo "$result" | jq -e '.valid == true'

  build-and-test:
    runs-on: ubuntu-latest
    needs: validate-dockerfile
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to DHI registry
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          load: true
          tags: mcp-snowflake-server:test
          cache-from: |
            type=gha,scope=docker-check
            type=gha,scope=docker-check-main
          cache-to: type=gha,scope=docker-check${{ github.ref == 'refs/heads/main' && '-main' || '' }},mode=max

      - name: Smoke test - container starts
        run: |
          docker run --rm mcp-snowflake-server:test --help
