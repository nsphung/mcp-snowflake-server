name: Docker Image Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-dockerfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Validate Dockerfile
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          call: check

  validate-server-json:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Validate server.json against MCP registry
        run: |
          # Substitute ${VERSION} placeholder with a dummy semver so the API accepts it
          payload=$(jq '.version = "0.0.0" | .packages[0].version = "0.0.0" | .packages[1].identifier |= gsub("\\$\\{VERSION\\}"; "0.0.0")' server.json)
          result=$(echo "$payload" | curl -sf -X POST https://registry.modelcontextprotocol.io/v0.1/validate \
            -H 'Content-Type: application/json' \
            -d @-)
          echo "$result"
          echo "$result" | jq -e '.valid == true'

  build-and-test:
    runs-on: ubuntu-latest
    needs: validate-dockerfile
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to DHI registry
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          load: true
          tags: mcp-snowflake-server:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test - container starts
        run: |
          docker run --rm mcp-snowflake-server:test --help
