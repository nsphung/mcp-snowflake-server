name: Docker Image Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-dockerfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Validate Dockerfile
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          call: check

  validate-server-json:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Validate server.json against MCP registry
        run: |
          # Substitute ${VERSION} placeholder with a dummy semver so the API accepts it
          payload=$(jq '.version = "0.0.0" | .packages[0].version = "0.0.0" | .packages[1].identifier |= gsub("\\$\\{VERSION\\}"; "0.0.0")' server.json)
          result=$(echo "$payload" | curl -sf -X POST https://registry.modelcontextprotocol.io/v0.1/validate \
            -H 'Content-Type: application/json' \
            -d @-)
          echo "$result"
          echo "$result" | jq -e '.valid == true'

  build-and-test:
    runs-on: ubuntu-latest
    needs: validate-dockerfile
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to DHI registry
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          load: true
          tags: mcp-snowflake-server:test
          cache-from: |
            type=gha,scope=docker-check
            type=gha,scope=docker-check-main
          cache-to: type=gha,scope=docker-check${{ github.ref == 'refs/heads/main' && '-main' || '' }},mode=max

      - name: Smoke test - container starts
        run: |
          docker run --rm mcp-snowflake-server:test --help
