name: Feature request
description: Suggest an idea or enhancement for this project.
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement.
        Please search existing issues first to avoid duplicates.

  - type: checkboxes
    id: checks
    attributes:
      label: Preconditions
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
      placeholder: A clear and concise description of the pain point.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe your preferred solution or API shape.
      placeholder: What would you like to happen?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What alternatives have you considered?
    validations:
      required: false

  - type: textarea
    id: use_case
    attributes:
      label: Use case and impact
      description: Who benefits, and how often is this needed?
    validations:
      required: true

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Links, prior art, examples, or screenshots.
    validations:
      required: false
